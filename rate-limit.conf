# ==============================================================================
# NGINX RATE LIMITING - COMPLETE CONFIGURATION
# ==============================================================================
# Usage:
#   1. Copy the MAP definitions into /etc/nginx/nginx.conf inside the http {} block
#   2. Copy the LIMIT directives into your server {} block (outside location blocks)
#   3. Test: nginx -t && nginx -s reload
# ==============================================================================

# ==============================================================================
# PART 1: MAP DEFINITIONS
# Paste these inside the http {} block in /etc/nginx/nginx.conf
# ==============================================================================

# Rate limit keys for specific endpoints (empty by default, populated by match)
map $request_uri $login_limit_key {
    default "";
    ~*wp-login\.php $binary_remote_addr;
}

map $request_uri $admin_limit_key {
    default "";
    ~*/wp-admin/ $binary_remote_addr;
}

map $request_uri $xmlrpc_limit_key {
    default "";
    ~*xmlrpc\.php $binary_remote_addr;
}

# Rate limit zones (memory allocation and rate definitions)
# global_limit: General protection for all requests (10MB = ~160k IPs)
limit_req_zone $binary_remote_addr   zone=global_limit:10m    rate=25r/s;
# wp_login_limit: WordPress login protection (strict)
limit_req_zone $login_limit_key      zone=wp_login_limit:10m  rate=1r/s;
# wp_admin_limit: WordPress admin area protection
limit_req_zone $admin_limit_key      zone=wp_admin_limit:10m  rate=5r/s;
# wp_xmlrpc_limit: XML-RPC strict limiting
limit_req_zone $xmlrpc_limit_key     zone=wp_xmlrpc_limit:10m rate=1r/m;

# ==============================================================================
# PART 2: RATE LIMIT DIRECTIVES
# Add these inside your server {} block in /etc/nginx/sites-available/*
# Must be placed OUTSIDE any location {} blocks
# ==============================================================================

# General global protection (always active for all requests)
limit_req zone=global_limit burst=50 nodelay;

# Targeted protection (only triggers when map matches the request URI)
# These only apply if the map-defined key is NOT empty.
limit_req zone=wp_login_limit burst=5 nodelay;
limit_req zone=wp_admin_limit burst=10 nodelay;
limit_req zone=wp_xmlrpc_limit burst=2 nodelay;

# ==============================================================================
# PART 3: CUSTOM RATE LIMIT RESPONSE (Optional)
# Add this to return 429 Too Many Requests with a helpful message
# ==============================================================================
