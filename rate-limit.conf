# NGINX RATE LIMITING SNIPPET
# 1. Define the zones in your main /etc/nginx/nginx.conf inside the http {} block:
# limit_req_zone $binary_remote_addr zone=global_limit:10m rate=25r/s;
# limit_req_zone $binary_remote_addr zone=wp_login_limit:10m rate=1r/s;
# limit_req_zone $binary_remote_addr zone=wp_admin_limit:10m rate=5r/s;

# 2. Include this snippet in your server {} block:
# include snippets/rate-limit.conf;

# General Rate Limit (Global)
# Applied to all requests to catch aggressive scrapers or floods.
limit_req zone=global_limit burst=50 nodelay;

# Rate limit WordPress Login
location = /wp-login.php {
    limit_req zone=wp_login_limit burst=5 nodelay;
    # IMPORTANT: You must also include your PHP processing here
    # include snippets/fastcgi-php.conf;
}

# Rate limit WordPress Admin access
location /wp-admin/ {
    limit_req zone=wp_admin_limit burst=10;
    try_files $uri $uri/ /index.php?$args;
}
