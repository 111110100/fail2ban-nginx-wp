# NGINX RATE LIMITING (MAP BASED)
# 1. Define these maps in your /etc/nginx/nginx.conf inside the http {} block:
# 
# map $request_uri $is_login {
#     default 0;
#     ~*wp-login.php 1;
# }
# 
# map $request_uri $is_admin {
#     default 0;
#     ~*/wp-admin/ 1;
# }
#
# map $request_uri $is_xmlrpc {
#     default 0;
#     ~*xmlrpc.php 1;
# }
#
# limit_req_zone $binary_remote_addr zone=global_limit:10m rate=25r/s;
# limit_req_zone $binary_remote_addr zone=wp_login_limit:10m rate=1r/s;
# limit_req_zone $binary_remote_addr zone=wp_admin_limit:10m rate=5r/s;
# limit_req_zone $binary_remote_addr zone=wp_xmlrpc_limit:10m rate=1r/m;

# 2. Add these to your server {} block (outside any location blocks):

# General global protection
limit_req zone=global_limit burst=50 nodelay;

# Targeted protection (even if standard locations overlap)
if ($is_login) {
    set $limit_zone "wp_login_limit";
}
if ($is_admin) {
    set $limit_zone "wp_admin_limit";
}
if ($is_xmlrpc) {
    set $limit_zone "wp_xmlrpc_limit";
}

# Apply the dynamic limits
limit_req zone=$limit_zone burst=5 nodelay;
