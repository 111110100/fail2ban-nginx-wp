# NGINX RATE LIMITING (MAP BASED - FIXED)
# 1. Define these maps in your /etc/nginx/nginx.conf inside the http {} block:
# 
# map $request_uri $login_limit_key {
#     default "";
#     ~*wp-login.php $binary_remote_addr;
# }
# 
# map $request_uri $admin_limit_key {
#     default "";
#     ~*/wp-admin/ $binary_remote_addr;
# }
#
# map $request_uri $xmlrpc_limit_key {
#     default "";
#     ~*xmlrpc.php $binary_remote_addr;
# }
#
# limit_req_zone $binary_remote_addr  zone=global_limit:10m   rate=25r/s;
# limit_req_zone $login_limit_key     zone=wp_login_limit:10m rate=1r/s;
# limit_req_zone $admin_limit_key     zone=wp_admin_limit:10m rate=5r/s;
# limit_req_zone $xmlrpc_limit_key    zone=wp_xmlrpc_limit:10m rate=1r/m;

# 2. Add these to your server {} block (outside any location blocks):

# General global protection (always active)
limit_req zone=global_limit burst=50 nodelay;

# Targeted protection
# These only apply if the map-defined key is NOT empty.
limit_req zone=wp_login_limit burst=5 nodelay;
limit_req zone=wp_admin_limit burst=10;
limit_req zone=wp_xmlrpc_limit burst=2 nodelay;
