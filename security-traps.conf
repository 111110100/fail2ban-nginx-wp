# 1. Copy this file to /etc/nginx/snippets
# 2. Include it inside your server {} config: include snippets/security-traps.conf;
# 3. Check and restart your nginx server: nginx -t && nginx -s reload

# Scanner trap endpoints
location ~* (\.env|\.git|\.aws|\.DS_Store|phpinfo\.php|composer\.json|vendor/phpunit|wp-admin/install\.php) {
    access_log /var/log/nginx/honeypot.log;
    return 403;
}

# Tarpit scanners
location ~* (\.sql|\.bak|\.backup|\.old|\.tar|\.zip) {
    limit_rate 1k;
    return 403;
}

# KILL SWITCH: Block XML-RPC (Common attack vector)
location ~* xmlrpc\.php {
    access_log /var/log/nginx/honeypot.log;
    return 403;
}

# KILL SWITCH: Protect WP-Cron from external floods
# This allows the server itself to run cron, but blocks everyone else.
location = /wp-cron.php {
    access_log /var/log/nginx/honeypot.log;
    allow 127.0.0.1;
    # allow <YOUR_SERVER_IP>; # Uncomment and add your server IP if needed
    deny all;
}
